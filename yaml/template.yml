Actor:
  types:
    - character

  templates: {}

  character:
    templates: []

Item:
  types:
    # Equipment Types
    - ammunition
    - armour
    - augmentation
    - contagion
    - explosive

    # Character Stats & Abilities
    - talent

  templates:
    basicItemData:
      description: ''
      source: 'Core Rulebook'

    gearItemData:
      size: 'Insignificant'
      structure:
        value: 1
        max: 1
      faults: []
      # TODO: Item Qualities
      restriction:
        value: ''
        concilium: false
      cost: ''
      maintenance: ''
      tariff: '-'

  # Equipment Types
  ammunition:
    templates:
      - basicItemData
      - gearItemData
    category: 'Standard'

  armour:
    templates:
      - basicItemData
      - gearItemData
    # TODO: Customising Armour, Core Rulebook p.342
    type: 'Civilian'
    soak:
      # Symbiont Armours
      symbiont: 0
      # Human Armours
      head: 0
      torso: 0
      arm: 0
      leg: 0
    bts: 0
    # Symbiont Armours
    symbiont:
      vigour: 10
      wounds:
        value: 0
        max: 1

  augmentation:
    type: 'Implant'
    category: 'Cybernetic'
    location: ''

  contagion:
    category: 'Disease'
    type:
      value: 'Instant'
      difficulty: 1
      momentum: 1
    term: 'Round'
    vector: ''
    damage: ''

  explosive:
    category: 'Charge'
    damage: ''

  # Character Stats & Abilities
  talent:
    templates: [basicItemData]
    skill: 'Acrobatics'
    isRanked: false
    rank:
      current: 1
      max: 1
    prerequisites: []
