Actor:
  types:
    - character

  templates: {}

  character:
    templates: []

Item:
  types:
    # Equipment Types
    - ammunition
    - armour
    - augmentation
    - contagion
    - explosive
    - gear
    - hackingDevice
    - lhost
    - program
    - weapon

    # Character Stats & Abilities
    - ability
    - itemQuality
    - talent

  templates:
    basicItemData:
      description: ''
      source: 'Core Rulebook'

    gearItemData:
      size: 'Insignificant'
      structure:
        value: 1
        max: 1
