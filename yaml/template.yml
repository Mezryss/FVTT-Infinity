Actor:
  types:
    - character

  templates: {}

  character:
    templates: []

Item:
  types:
    # Equipment Types
    - ammunition
    - armour

    # Character Stats & Abilities
    - talent

  templates:
    basicItemData:
      description: ''
      source: 'Core Rulebook'

    gearItemData:
      size: 'Insignificant'
      structure:
        value: 1
        max: 1
      faults: []
      # TODO: Item Qualities
      restriction:
        value: 0
        concilium: false
        notes: ''
      cost:
        static: 0
        rolled: 0
      maintenance: ''
      tariff:
        value: 0
        notes: ''

  # Equipment Types
  ammunition:
    templates:
      - basicItemData
      - gearItemData
    category: 'Standard'

  armour:
    templates:
      - basicItemData
      - gearItemData
    # TODO: Customising Armour, Core Rulebook p.342
    type: 'Civilian'
    soak:
      # Symbiont Armours
      symbiont: 0
      # Human Armours
      head: 0
      torso: 0
      arm: 0
      leg: 0
    bts: 0
    # Symbiont Armours
    symbiont:
      vigour: 10
      wounds:
        value: 0
        max: 1

  # Character Stats & Abilities
  talent:
    templates: [basicItemData]
    skill: 'Acrobatics'
    isRanked: false
    rank:
      current: 1
      max: 1
    prerequisites: []
